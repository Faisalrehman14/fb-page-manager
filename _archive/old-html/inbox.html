<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox - Page Inbox</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="/dashboard.html" class="header-brand">
            <svg viewBox="0 0 24 24" fill="currentColor" style="color: var(--primary-color);">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
            <h1>Page Inbox</h1>
        </a>
        <nav class="header-nav">
            <a href="/dashboard.html" class="btn btn-secondary btn-sm">← Back to Pages</a>
            <button id="logout-btn" class="btn btn-secondary btn-sm">Disconnect</button>
        </nav>
    </header>
    
    <main class="container">
        <!-- Important Notice -->
        <div class="notice-banner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <p><strong>Important:</strong> Only conversations where you can reply are shown. Only respond to customers who messaged first. No bulk or automated messaging.</p>
        </div>
        
        <!-- Error Container -->
        <div id="error-container" class="hidden"></div>
        
        <!-- Conversations Card -->
        <div class="card">
            <div class="card-header">
                <h2>Conversations</h2>
                <button id="refresh-btn" class="btn btn-secondary btn-sm">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                    Refresh
                </button>
            </div>
            
            <div id="conversation-list" class="conversation-list">
                <!-- Conversations will be loaded here -->
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <span>Loading conversations...</span>
                </div>
            </div>
        </div>
        
        <!-- Help Text -->
        <p style="margin-top: 16px; font-size: 13px; color: var(--text-muted); text-align: center;">
            Click a conversation to view messages and reply to the customer.
        </p>
    </main>
    
    <script src="/js/app.js"></script>
</body>
</html>
