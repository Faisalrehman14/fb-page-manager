<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation - Page Inbox</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
</head>
<body>
    <div class="thread-container">
        <!-- Thread Header -->
        <div class="thread-header">
            <a id="back-link" href="/inbox.html" class="thread-back">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back
            </a>
            <span id="participant-name" class="thread-participant">Customer</span>
        </div>
        
        <!-- Messages Container -->
        <div id="messages-container" class="messages-container">
            <div class="loading">
                <div class="loading-spinner"></div>
                <span>Loading messages...</span>
            </div>
        </div>
        
        <!-- Compose Area -->
        <div class="compose-container">
            <!-- Notice -->
            <div class="compose-notice">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span>Only reply to customers who messaged first. No unsolicited or bulk messages. Rate limited: 1 message per 3 seconds.</span>
            </div>
            
            <!-- Error/Success Container -->
            <div id="compose-error" class="hidden"></div>
            
            <!-- Compose Form -->
            <div class="compose-form">
                <textarea 
                    id="message-input" 
                    class="compose-input" 
                    placeholder="Type your reply..."
                    rows="1"
                    maxlength="2000"
                ></textarea>
                <button id="send-btn" class="btn btn-primary compose-submit" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
            <div id="char-count" class="char-count">0/2000</div>
        </div>
    </div>
    
    <script src="/js/app.js"></script>
</body>
</html>
