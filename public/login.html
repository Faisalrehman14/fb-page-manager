<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — FBCast Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/auth-pages.css">
</head>
<body class="auth-page">
  <a href="/" class="auth-back"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
  <div class="auth-card">
    <p class="auth-brand">FBCast Pro</p>
    <h1 class="auth-title">Sign in</h1>
    <p class="auth-sub">Welcome back — your Facebook connection stays linked.</p>
    <div id="authError" class="auth-error" role="alert"></div>
    <form id="authForm" data-mode="login" novalidate>
      <div class="auth-field">
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
      </div>
      <div class="auth-field">
        <label for="password">Password</label>
        <div class="auth-pw-wrap">
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Your password" required>
          <button type="button" class="auth-pw-toggle" data-pw-toggle="password" aria-label="Show password"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <button type="submit" class="auth-btn" id="authSubmit">Sign in</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="/signup">Create account</a></p>
  </div>
  <script src="/assets/js/auth-pages.js" defer></script>
</body>
</html>
