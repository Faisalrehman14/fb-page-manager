<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create account — FBCast Pro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/auth-pages.css">
</head>
<body class="auth-page">
  <a href="/" class="auth-back"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
  <div class="auth-card">
    <p class="auth-brand">FBCast Pro</p>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-sub">Get started with FBCast Pro — connect Facebook after signup.</p>
    <div id="authError" class="auth-error" role="alert"></div>
    <form id="authForm" data-mode="signup" novalidate>
      <div class="auth-row">
        <div class="auth-field">
          <label for="firstName">First name</label>
          <input id="firstName" name="firstName" type="text" autocomplete="given-name" placeholder="John" required>
        </div>
        <div class="auth-field">
          <label for="lastName">Last name</label>
          <input id="lastName" name="lastName" type="text" autocomplete="family-name" placeholder="Doe" required>
        </div>
      </div>
      <div class="auth-field">
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
      </div>
      <div class="auth-field">
        <label for="password">Password</label>
        <div class="auth-pw-wrap">
          <input id="password" name="password" type="password" autocomplete="new-password" placeholder="Create a password" required minlength="8">
          <button type="button" class="auth-pw-toggle" data-pw-toggle="password" aria-label="Show password"><i class="fa-solid fa-eye"></i></button>
        </div>
        <p class="auth-hint">Must be at least 8 characters</p>
      </div>
      <div class="auth-field">
        <label for="confirmPassword">Confirm password</label>
        <div class="auth-pw-wrap">
          <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" placeholder="Confirm your password" required>
          <button type="button" class="auth-pw-toggle" data-pw-toggle="confirmPassword" aria-label="Show password"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <div class="auth-field">
        <label for="referral">Referral name <span style="font-weight:400;color:#94a3b8">(optional)</span></label>
        <input id="referral" name="referral" type="text" placeholder="Who referred you?">
      </div>
      <button type="submit" class="auth-btn" id="authSubmit">Create account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="/login">Sign in</a></p>
  </div>
  <script src="/assets/js/auth-pages.js" defer></script>
</body>
</html>
